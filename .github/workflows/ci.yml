name: CI

on:
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run build && npm run test:node

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  version-check:
    name: Version Consistency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check version consistency
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PLUGIN_VERSION=$(node -p "require('./plugins/oh-my-codex/.codex-plugin/plugin.json').version")

          echo "package.json:  $PKG_VERSION"
          echo "plugin.json:   $PLUGIN_VERSION"

          if [ "$PKG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo ""
            echo "❌ Version mismatch!"
            echo "  package.json: $PKG_VERSION"
            echo "  plugin.json:  $PLUGIN_VERSION"
            exit 1
          fi

          echo "✅ All versions match: $PKG_VERSION"

  npm-pack-test:
    name: npm pack + install test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: npm pack test
        run: |
          echo "📦 Creating tarball..."
          npm pack

          TARBALL=$(ls -t oh-my-codex-pennix-*.tgz | head -1)
          echo "📦 Tarball: $TARBALL"

          echo "📦 Testing global install from tarball..."
          npm install -g ./$TARBALL

          echo "🔍 Checking omx command..."
          which omx

          echo "🔍 Testing omx --version..."
          omx --version

          VERSION_OUTPUT=$(omx --version 2>&1)
          if [ $? -ne 0 ]; then
            echo "❌ omx --version failed!"
            echo "$VERSION_OUTPUT"
            exit 1
          fi

          echo "✅ omx --version: $VERSION_OUTPUT"
          echo "✅ npm pack + install test passed!"
