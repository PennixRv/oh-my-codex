name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_DIST_VERSION: 0.31.0

jobs:
  verify-version-sync:
    name: Verify Version Sync
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Verify version sync against workspace crates
        shell: bash
        run: |
          node --input-type=module <<'EOF'
          import fs from 'node:fs';
          import path from 'node:path';
          import TOML from '@iarna/toml';

          const root = process.cwd();
          const pkg = JSON.parse(fs.readFileSync(path.join(root, 'package.json'), 'utf-8'));
          const workspace = TOML.parse(fs.readFileSync(path.join(root, 'Cargo.toml'), 'utf-8'));
          const expectedMembers = [
            'crates/omx-api',
            'crates/omx-explore',
            'crates/omx-mux',
            'crates/omx-runtime-core',
            'crates/omx-runtime',
            'crates/omx-sparkshell',
          ];
          const manifests = [
            'crates/omx-api/Cargo.toml',
            'crates/omx-explore/Cargo.toml',
            'crates/omx-mux/Cargo.toml',
            'crates/omx-runtime-core/Cargo.toml',
            'crates/omx-runtime/Cargo.toml',
            'crates/omx-sparkshell/Cargo.toml',
          ];
          const problems = [];

          if (workspace.workspace?.package?.version !== pkg.version) {
            problems.push(`workspace version (${workspace.workspace?.package?.version ?? 'missing'}) does not match package.json (${pkg.version})`);
          }

          if (JSON.stringify(workspace.workspace?.members ?? []) !== JSON.stringify(expectedMembers)) {
            problems.push(`workspace members do not match expected crates list: ${JSON.stringify(workspace.workspace?.members ?? [])}`);
          }

          for (const rel of manifests) {
            const manifest = TOML.parse(fs.readFileSync(path.join(root, rel), 'utf-8'));
            if (JSON.stringify(manifest.package?.version) !== JSON.stringify({ workspace: true })) {
              problems.push(`${rel} must use version.workspace = true`);
            }
          }

          const tag = process.env.GITHUB_REF_NAME;
          if (tag && tag !== `v${pkg.version}`) {
            problems.push(`release tag (${tag}) does not match package.json version (v${pkg.version})`);
          }

          if (problems.length > 0) {
            for (const problem of problems) console.error(`[version-sync] ${problem}`);
            process.exit(1);
          }

          console.log(`[version-sync] OK package=${pkg.version} workspace=${workspace.workspace?.package?.version} tag=${tag ?? ''}`.trim());
          EOF

  build-native:
    name: Build native (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: [verify-version-sync]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Install Linux musl toolchain
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Configure Linux musl environment
        if: runner.os == 'Linux'
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl)
              echo "CC_x86_64_unknown_linux_musl=musl-gcc" >> "$GITHUB_ENV"
              ;;
          esac
      - name: Install cargo-dist
        shell: bash
        run: cargo install cargo-dist --locked --version "$CARGO_DIST_VERSION"
      - name: Build dist artifacts for target
        shell: bash
        run: dist build -a local --target "${{ matrix.target }}" --output-format=json > "dist-build-${{ matrix.target }}.json"
      - name: Upload target release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: |
            target/distrib/*
            dist-build-${{ matrix.target }}.json
          if-no-files-found: error

  publish-native-assets:
    name: Publish Native Assets
    runs-on: ubuntu-24.04
    needs: [build-native]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          path: release-artifacts
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install cargo-dist
        shell: bash
        run: cargo install cargo-dist --locked --version "$CARGO_DIST_VERSION"
      - name: Generate release manifest from cargo-dist plan
        shell: bash
        run: |
          dist plan --output-format=json > dist-plan.json
          mkdir -p release-assets
          find release-artifacts -type f \( -name '*.tar.xz' -o -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} release-assets/ \;
          node dist/scripts/generate-native-release-manifest.js \
            --plan dist-plan.json \
            --artifacts-dir release-assets \
            --out release-assets/native-release-manifest.json \
            --release-base-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}" \
            --require-products "omx-api,omx-explore-harness,omx-sparkshell"
      - name: Upload release asset bundle for follow-up jobs
        uses: actions/upload-artifact@v4
        with:
          name: native-release-assets
          path: release-assets/*
          if-no-files-found: error
      - name: Generate release body
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ -s RELEASE_BODY.md ]; then
            PREVIOUS_TAG=""
            while read -r CANDIDATE_TAG; do
              if [ -z "$CANDIDATE_TAG" ] || [ "$CANDIDATE_TAG" = "$GITHUB_REF_NAME" ]; then
                continue
              fi
              if ! git merge-base --is-ancestor "$CANDIDATE_TAG" "$GITHUB_REF_NAME" >/dev/null 2>&1; then
                continue
              fi
              if gh release view "$CANDIDATE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
                PREVIOUS_TAG="$CANDIDATE_TAG"
                break
              fi
            done < <(git tag --sort=-creatordate)
            ARGS=(
              --template RELEASE_BODY.md
              --out RELEASE_BODY.generated.md
              --current-tag "$GITHUB_REF_NAME"
              --repo "$GITHUB_REPOSITORY"
            )
            if [ -n "$PREVIOUS_TAG" ]; then
              ARGS+=(--previous-tag "$PREVIOUS_TAG")
            fi
            node dist/scripts/generate-release-body.js \
              "${ARGS[@]}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            cat > RELEASE_BODY.generated.md <<EOF
          ## oh-my-codex-pennix v${VERSION}

          ### Install / Update
          \`\`\`bash
          npm install -g oh-my-codex-pennix@${VERSION}
          \`\`\`

          ### Provenance
          Forked from upstream source [Yeachan-Heo/oh-my-codex](https://github.com/Yeachan-Heo/oh-my-codex).
          EOF
          fi
      - name: Attach native assets to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_BODY.generated.md
          files: release-assets/*
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Write release summary
        shell: bash
        run: |
          {
            echo '## Native Release Assets'
            echo ''
            echo 'Published release assets:'
            ls -1 release-assets | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"

  smoke-verify-native:
    name: Smoke Verify Native Assets
    runs-on: ubuntu-24.04
    needs: [publish-native-assets]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          name: native-release-assets
          path: release-assets
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify release archives and manifest
        run: node dist/scripts/verify-native-release-assets.js --manifest release-assets/native-release-manifest.json --artifacts-dir release-assets

  smoke-packed-install:
    name: Smoke Test Packed Global Install
    runs-on: ubuntu-24.04
    needs: [smoke-verify-native]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Smoke test packed install boot + core commands
        run: npm run smoke:packed-install

  publish-npm:
    name: Publish npm Package
    runs-on: ubuntu-24.04
    needs: [smoke-packed-install]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm run verify:native-agents
      - run: npm run sync:plugin
      - run: npm run verify:plugin-bundle
      - run: npm run test:node
      - name: Verify version sync against workspace crates
        shell: bash
        run: |
          node --input-type=module <<'EOF'
          import fs from 'node:fs';
          import path from 'node:path';
          import TOML from '@iarna/toml';

          const root = process.cwd();
          const pkg = JSON.parse(fs.readFileSync(path.join(root, 'package.json'), 'utf-8'));
          const workspace = TOML.parse(fs.readFileSync(path.join(root, 'Cargo.toml'), 'utf-8'));
          const expectedMembers = [
            'crates/omx-api',
            'crates/omx-explore',
            'crates/omx-mux',
            'crates/omx-runtime-core',
            'crates/omx-runtime',
            'crates/omx-sparkshell',
          ];
          const manifests = [
            'crates/omx-api/Cargo.toml',
            'crates/omx-explore/Cargo.toml',
            'crates/omx-mux/Cargo.toml',
            'crates/omx-runtime-core/Cargo.toml',
            'crates/omx-runtime/Cargo.toml',
            'crates/omx-sparkshell/Cargo.toml',
          ];
          const problems = [];

          if (workspace.workspace?.package?.version !== pkg.version) {
            problems.push(`workspace version (${workspace.workspace?.package?.version ?? 'missing'}) does not match package.json (${pkg.version})`);
          }

          if (JSON.stringify(workspace.workspace?.members ?? []) !== JSON.stringify(expectedMembers)) {
            problems.push(`workspace members do not match expected crates list: ${JSON.stringify(workspace.workspace?.members ?? [])}`);
          }

          for (const rel of manifests) {
            const manifest = TOML.parse(fs.readFileSync(path.join(root, rel), 'utf-8'));
            if (JSON.stringify(manifest.package?.version) !== JSON.stringify({ workspace: true })) {
              problems.push(`${rel} must use version.workspace = true`);
            }
          }

          const tag = process.env.GITHUB_REF_NAME;
          if (tag && tag !== `v${pkg.version}`) {
            problems.push(`release tag (${tag}) does not match package.json version (v${pkg.version})`);
          }

          if (problems.length > 0) {
            for (const problem of problems) console.error(`[version-sync] ${problem}`);
            process.exit(1);
          }

          console.log(`[version-sync] OK package=${pkg.version} workspace=${workspace.workspace?.package?.version} tag=${tag ?? ''}`.trim());
          EOF
      - run: npm pack --dry-run
      - name: Publish to npm
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "oh-my-codex-pennix@$VERSION" version 2>/dev/null; then
            echo "::warning::Version $VERSION already published to npm, skipping publish"
          else
            set -o pipefail
            if npm publish --access public --provenance 2>&1 | tee npm-publish.log; then
              echo "Published to npm with provenance"
            elif grep -Eiq 'TLOG_CREATE_ENTRY_ERROR|tlog|rekor|transparency log' npm-publish.log; then
              echo "::warning::npm provenance publish failed due to Sigstore/Rekor transparency log outage; retrying without provenance"
              npm publish --access public
            else
              exit 1
            fi
          fi
      - name: Verify npm publication
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          for i in $(seq 1 20); do
            if [ "$(npm view "oh-my-codex-pennix@$VERSION" version 2>/dev/null || true)" = "$VERSION" ]; then
              npm view "oh-my-codex-pennix@$VERSION" version
              exit 0
            fi
            sleep 15
          done
          echo "npm did not expose oh-my-codex-pennix@$VERSION in time" >&2
          exit 1
