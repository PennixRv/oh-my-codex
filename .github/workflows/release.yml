name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Sync plugin bundle
        run: npm run sync:plugin

      - name: Verify native agents + plugin bundle
        run: npm run verify:native-agents && npm run verify:plugin-bundle

      - name: Run tests
        run: npm run test:node

      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view oh-my-codex-pennix@$VERSION version 2>/dev/null; then
            echo "::warning::Version $VERSION already published to npm, skipping publish"
          else
            set -o pipefail
            if npm publish --access public --provenance 2>&1 | tee npm-publish.log; then
              echo "Published to npm with provenance"
            elif grep -Eiq 'TLOG_CREATE_ENTRY_ERROR|tlog|rekor|transparency log' npm-publish.log; then
              echo "::warning::npm provenance publish failed due to Sigstore/Rekor transparency log outage; retrying without provenance"
              npm publish --access public
            else
              exit 1
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Prepare release notes
        run: |
          if [ -s RELEASE_BODY.md ]; then
            echo "Generating release notes from RELEASE_BODY.md template"
            PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -Fxv "$GITHUB_REF_NAME" | head -n 1 || true)
            ARGS=(
              --template RELEASE_BODY.md
              --out release-notes.md
              --current-tag "$GITHUB_REF_NAME"
              --repo "$GITHUB_REPOSITORY"
            )
            if [ -n "$PREVIOUS_TAG" ]; then
              ARGS+=(--previous-tag "$PREVIOUS_TAG")
            fi
            node dist/scripts/generate-release-body.js \
              "${ARGS[@]}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            echo "Falling back to minimal release notes"
            echo "## oh-my-codex-pennix v${VERSION}" > release-notes.md
            echo "" >> release-notes.md
            echo "### Install / Update" >> release-notes.md
            echo '```bash' >> release-notes.md
            echo "npm install -g oh-my-codex-pennix@${VERSION}" >> release-notes.md
            echo '```' >> release-notes.md
            echo "" >> release-notes.md
            echo "### Provenance" >> release-notes.md
            echo "Forked from upstream source [Yeachan-Heo/oh-my-codex](https://github.com/Yeachan-Heo/oh-my-codex)." >> release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
